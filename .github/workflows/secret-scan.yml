name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITLEAKS_VERSION: v8.30.1

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          if command -v gitleaks >/dev/null 2>&1; then
            gitleaks version
            exit 0
          fi

          os="$(uname -s)"
          arch="$(uname -m)"
          case "${os}:${arch}" in
            Linux:x86_64) asset="linux_x64" ;;
            Linux:arm64) asset="linux_arm64" ;;
            Darwin:arm64) asset="darwin_arm64" ;;
            Darwin:x86_64) asset="darwin_x64" ;;
            *)
              echo "Unsupported runner platform: ${os}/${arch}" >&2
              exit 1
              ;;
          esac

          install_dir="${RUNNER_TEMP:-/tmp}/gitleaks-bin"
          mkdir -p "${install_dir}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION#v}_${asset}.tar.gz" -o "${install_dir}/gitleaks.tar.gz"
          tar -xzf "${install_dir}/gitleaks.tar.gz" -C "${install_dir}" gitleaks
          chmod 0755 "${install_dir}/gitleaks"
          echo "${install_dir}" >> "${GITHUB_PATH}"
          "${install_dir}/gitleaks" version

      - name: Fetch pull request base
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"

      - name: Run pull request secret scan
        if: github.event_name == 'pull_request'
        run: npm run security:secrets -- --base "origin/${{ github.base_ref }}" --head HEAD

      - name: Run push secret scan
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          ZERO="0000000000000000000000000000000000000000"
          if [ "${BEFORE}" = "${ZERO}" ] || ! git rev-parse --verify "${BEFORE}^{commit}" >/dev/null 2>&1; then
            echo "Push base ${BEFORE} unavailable; running full-history secret scan."
            npm run security:secrets -- --full-history
          else
            npm run security:secrets -- --base "${BEFORE}" --head "${HEAD}"
          fi

      - name: Run manual full-history secret scan
        if: github.event_name == 'workflow_dispatch'
        run: npm run security:secrets -- --full-history
