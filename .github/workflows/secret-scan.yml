name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITLEAKS_VERSION: v8.30.1

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Fetch pull request base
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"

      - name: Run pull request secret scan
        if: github.event_name == 'pull_request'
        run: npm run security:secrets -- --base "origin/${{ github.base_ref }}" --head HEAD

      - name: Run push secret scan
        if: github.event_name == 'push'
        run: npm run security:secrets -- --base "${{ github.event.before }}" --head "${{ github.sha }}"

      - name: Run manual full-history secret scan
        if: github.event_name == 'workflow_dispatch'
        run: npm run security:secrets -- --full-history
